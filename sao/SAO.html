<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <title>SAO_OS - Vanilla JS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-vibe="chill" class="min-h-[100dvh] bg-[#f4f4f5] dark:bg-[#030303] text-slate-900 dark:text-gray-100 overflow-hidden antialiased transition-colors duration-700 selection:bg-indigo-500/20 high-end-ui">

    <div id="app-container" class="flex h-[100dvh] overflow-hidden font-sans relative gap-2 p-2 md:gap-3 md:p-3 xl:gap-4 xl:p-4">
        
        <!-- Background Aura (Reactive Biologic UI) -->
        <div id="neon-container" class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-all duration-1000">
            <canvas id="fx-canvas" class="fx-canvas absolute inset-0"></canvas>
            <div id="parallax-root" class="absolute inset-0 parallax-root">
                <div id="neon-blob-1" data-depth="0.18" class="absolute top-[-15%] left-[-15%] w-[60vw] h-[60vw] bg-gradient-to-br from-blue-500 to-cyan-400 opacity-20 dark:opacity-[0.08] blur-[130px] rounded-full reactive-blob parallax-layer"></div>
                <div id="neon-blob-2" data-depth="0.24" class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-indigo-500/5 dark:bg-white/5 blur-[100px] rounded-full reactive-blob parallax-layer" style="animation-delay: -2s;"></div>
                <div id="neon-blob-3" data-depth="0.14" class="absolute top-[22%] right-[12%] w-[24vw] h-[24vw] opacity-20 blur-[90px] rounded-full reactive-blob parallax-layer"></div>
                <div id="vibe-beam" data-depth="0.08" class="absolute inset-[-12%] vibe-beam parallax-layer"></div>
                <div id="vibe-grid" data-depth="0.05" class="absolute inset-0 vibe-grid parallax-layer"></div>
                <div id="vibe-orbit" data-depth="0.1" class="absolute inset-0 flex items-center justify-center parallax-layer">
                    <div class="vibe-orbit-ring"></div>
                </div>
                <div id="vibe-particles" data-depth="0.2" class="absolute inset-0 vibe-particles parallax-layer"></div>
                <div id="specular-highlight" data-depth="0.3" class="absolute inset-0 specular-highlight parallax-layer"></div>
                <div id="vibe-overlay" class="absolute inset-0 hidden transition-opacity duration-1000"></div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="hidden md:flex w-[88px] xl:w-[280px] flex-col z-20 border border-white/40 dark:border-white/10 rounded-[2rem] bg-white/45 dark:bg-[#05070d]/55 backdrop-blur-2xl glass-premium-light dark:glass-premium-dark transition-all duration-500 overflow-hidden">
            <div class="p-4 flex items-center justify-center lg:justify-start gap-3 relative group">
                <div id="logo-icon" class="w-8 h-8 rounded-3xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center shadow-lg transition-all duration-500 group-hover:scale-110 group-hover:animate-pulse">
                    <i data-lucide="zap" class="text-white w-4 h-4"></i>
                </div>
                <h1 class="font-black text-base tracking-tighter hidden lg:block text-slate-900 dark:text-white">SAO_OS</h1>
                <div class="absolute right-4 top-5 hidden lg:block w-2 h-2 rounded-full bg-green-500 animate-ping-slow"></div>
            </div>

            <div class="px-3 py-2">
                <button data-magnetic="soft" onclick="startNewChat()" class="flex items-center justify-center lg:justify-between w-full rounded-3xl p-2.5 transition-all group shadow-sm bg-slate-200/50 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 text-slate-800 dark:text-white border border-transparent dark:border-white/20 active:scale-95" title="Iniciar nueva sesión (Ctrl+N)">
                    <span class="flex items-center gap-2 font-bold text-sm hidden lg:flex"><i data-lucide="plus" class="w-4 h-4 group-hover:rotate-90 transition-transform"></i> Nuevo Chat</span>
                    <i data-lucide="plus" class="w-4 h-4 lg:hidden group-hover:rotate-90 transition-transform"></i>
                </button>
            </div>

            <div id="sessions-list" class="flex-1 overflow-y-auto px-2.5 py-2.5 space-y-2 scrollbar-hide">
                <!-- Sessions injected here -->
            </div>

            <div class="p-4 border-t border-slate-200 dark:border-white/5">
                <button data-magnetic="soft" onclick="openSettings('appearance')" class="flex items-center justify-center lg:justify-start gap-2 w-full p-2.5 rounded-3xl transition-all text-[11px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300 hover:bg-slate-200/70 dark:hover:bg-white/10 hover:text-slate-900 dark:hover:text-white active:scale-95" title="Abrir ajustes">
                    <i data-lucide="sliders" class="w-4 h-4"></i> <span class="hidden lg:inline">Ajustes</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="min-w-0 flex-1 flex flex-col relative z-10 h-full overflow-hidden rounded-[2rem] border border-slate-200/70 dark:border-white/5 bg-white/10 dark:bg-black/10">
            
            <!-- Header -->
            <header id="app-header" class="h-14 md:h-16 flex items-center justify-between px-4 md:px-6 border-b border-slate-200 dark:border-white/5 bg-white/40 dark:bg-black/40 backdrop-blur-xl glass-premium-light dark:glass-premium-dark sticky top-0 z-30 transition-all">
                <div class="flex items-center gap-4">
                    <button data-magnetic="soft" onclick="toggleZenMode()" class="p-2 rounded-3xl transition-all text-slate-500 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5 active:scale-90" title="Modo Zen (Ocultar Panel)">
                        <i data-lucide="maximize-2" id="zen-icon" class="w-4 h-4"></i>
                    </button>
                    <div class="h-4 w-[1px] bg-slate-300 dark:bg-white/10"></div>
                    <div class="flex items-center gap-2 sm:gap-3">
                        <div class="status-pill-premium flex items-center gap-2 px-2.5 py-1.5 rounded-full border border-slate-200/80 dark:border-white/10 bg-white/65 dark:bg-white/5 shadow-sm">
                            <i data-lucide="activity" id="status-icon" class="w-3 h-3 text-cyan-500 transition-colors duration-500"></i>
                            <span id="status-label" class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-600 dark:text-slate-300">Chill Sync</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <div id="typing-indicator-header" class="hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest sm:flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"></span> Transmitiendo...
                    </div>

                    <button data-magnetic="soft" id="btn-arena" onclick="toggleBattleMode()" class="inline-flex items-center justify-center gap-1.5 h-9 px-2.5 xl:px-3 rounded-full transition-all border bg-white/65 dark:bg-white/5 text-slate-500 dark:text-slate-300 border-slate-200/80 dark:border-white/10 hover:text-slate-900 dark:hover:text-white hover:bg-white/80 dark:hover:bg-white/10 active:scale-95" title="Activar o desactivar Arena 2v2">
                        <i data-lucide="target" class="w-3.5 h-3.5"></i>
                        <span id="arena-text" class="hidden xl:inline">Arena</span>
                    </button>

                    <button data-magnetic="soft" onclick="openSettings('appearance')" class="md:hidden p-2 text-slate-400 dark:text-gray-500 hover:text-slate-900 dark:hover:text-white">
                        <i data-lucide="sliders" class="w-4 h-4"></i>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-container" class="flex-1 overflow-y-auto px-3 md:px-5 xl:px-6 pb-[170px] md:pb-[190px] pt-4 md:pt-6 custom-scrollbar relative scroll-smooth">
                <div id="messages-wrapper" class="w-full max-w-[1040px] min-h-full mx-auto flex flex-col gap-4 md:gap-6 relative">
                    <!-- Messages injected here -->
                </div>
            </div>

            <!-- Scroll to bottom -->
            <button data-magnetic="soft" id="btn-scroll-down" onclick="scrollToBottom()" class="hidden absolute bottom-[140px] left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-[2rem] shadow-2xl z-50 transition-all flex items-center gap-2 font-bold text-[11px] uppercase tracking-wider backdrop-blur-xl bg-white/90 dark:bg-black/80 border border-slate-200 dark:border-white/10 text-slate-800 dark:text-white hover:bg-white dark:hover:bg-black hover:scale-105 active:scale-95">
                <i data-lucide="arrow-down" class="w-3.5 h-3.5 animate-bounce"></i> <span id="scroll-text">Nuevos Datos</span>
            </button>

            <!-- Input Area -->
            <div class="chat-fade-dock absolute bottom-0 left-0 right-0 pt-4 md:pt-6 flex flex-col items-center pointer-events-none z-40 bg-gradient-to-t from-[#f4f4f5] via-[#f4f4f5]/88 dark:from-[#030303] dark:via-[#030303]/88 to-transparent">
                <div class="layout-shell w-full max-w-[1040px] pointer-events-auto relative">
                    
                    <!-- Reply Suggestions Container ✨ -->
                    <div id="reply-suggestions" class="flex flex-wrap gap-2 justify-end mb-2 hidden">
                        <!-- Chips injected here -->
                    </div>

                    <div id="char-counter" class="hidden" aria-hidden="true"></div>

                    <!-- Context Reply Banner (NEW) -->
                    <div id="reply-banner" class="hidden absolute -top-[45px] left-2 right-2 bg-indigo-500/10 border border-indigo-500/20 px-3 py-2 text-xs flex justify-between items-center text-slate-600 dark:text-gray-300 backdrop-blur-xl rounded-t-xl z-0 transition-all shadow-sm">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <i data-lucide="corner-down-right" class="w-3 h-3 text-indigo-500 flex-shrink-0"></i>
                            <span class="font-bold text-[10px] uppercase tracking-widest text-indigo-500" id="reply-banner-name">Agente</span>
                            <span class="truncate italic opacity-80 max-w-[200px] md:max-w-[400px]" id="reply-banner-text"></span>
                        </div>
                        <button type="button" onclick="cancelReply()" class="p-1 hover:text-red-500 transition-colors rounded-full hover:bg-white/10"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>

                    <form id="chat-form" onsubmit="event.preventDefault(); handleSend();" class="relative z-10 w-full border rounded-[2rem] p-1.5 flex items-end gap-2 transition-all duration-300 shadow-xl focus-within:ring-2 bg-white/72 dark:bg-black/62 backdrop-blur-xl border-slate-300 dark:border-white/10 focus-within:border-cyan-400 focus-within:ring-cyan-500/20">
                        
                        <!-- Image Preview ✨ -->
                        <div id="image-preview-container" class="hidden absolute -top-16 left-4 bg-white dark:bg-black p-1 rounded-xl border border-slate-200 dark:border-white/10 shadow-lg transform transition-all hover:scale-110 cursor-pointer" onclick="openLightbox(state.pendingImage)">
                            <img id="image-preview" src="" class="h-12 w-12 object-cover rounded-lg">
                            <button type="button" onclick="removePendingImage(event)" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-0.5 hover:bg-red-600 transition-colors shadow-md"><i data-lucide="x" class="w-3 h-3"></i></button>
                        </div>

                        <!-- Image Upload Button ✨ -->
                        <div class="flex flex-col justify-end p-2 pb-2 gap-1">
                             <button type="button" onclick="document.getElementById('image-upload').click()" class="text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors p-1" title="Analizar Imagen (Visión IA)">
                                 <i data-lucide="image" class="w-5 h-5"></i>
                             </button>
                             <input type="file" id="image-upload" class="hidden" accept="image/jpeg, image/png, image/webp" onchange="handleImageUpload(event)">
                        </div>

                        <textarea id="chat-input" rows="1" placeholder="Escribe un mensaje..." class="w-full max-h-[150px] min-h-[46px] py-3 px-2 text-[15px] bg-transparent border-none resize-none focus:outline-none font-medium leading-relaxed scrollbar-hide text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500"></textarea>
                        
                        <div class="flex items-center gap-1 pb-1 pr-1">
                            <button data-magnetic="soft" type="button" onclick="generateReplySuggestions()" class="p-2.5 rounded-full transition-all text-amber-500 hover:bg-amber-500/10 active:scale-95 group relative" title="Sugerir Respuesta con IA">
                                <i data-lucide="sparkles" class="w-4 h-4 group-hover:animate-pulse"></i>
                            </button>

                            <button data-magnetic="soft" type="button" id="btn-stop" onclick="abortGeneration()" class="hidden p-3 rounded-full transition-all active:scale-95 bg-red-500 text-white hover:bg-red-600 shadow-lg shadow-red-500/20" title="Detener Transmisión">
                                <i data-lucide="square" class="w-4 h-4 fill-current"></i>
                            </button>

                            <button data-magnetic="soft" type="submit" id="btn-send" disabled class="p-3 rounded-full transition-all active:scale-95 flex items-center justify-center bg-slate-200 dark:bg-white/5 text-slate-400 dark:text-gray-600" title="Enviar Mensaje (Enter)">
                                <i data-lucide="send" id="send-icon" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <div id="toast-container" aria-live="polite" class="fixed top-4 right-4 z-[70] flex flex-col gap-2 pointer-events-none"></div>

        <div id="session-menu-overlay" class="hidden fixed inset-0 z-[65] bg-slate-950/15 dark:bg-black/30 backdrop-blur-[3px]" onclick="closeSessionMenu()">
            <div id="session-menu-panel" class="session-menu-panel absolute left-3 top-3 w-[280px] max-w-[calc(100vw-1.5rem)] rounded-[1.5rem] border border-slate-200/70 dark:border-white/10 bg-white/75 dark:bg-[#05070d]/80 shadow-2xl backdrop-blur-2xl overflow-hidden" onclick="event.stopPropagation()">
                <div class="px-4 pt-4 pb-3 border-b border-slate-200/60 dark:border-white/10">
                    <p class="text-[9px] font-black uppercase tracking-[0.24em] text-slate-400 dark:text-slate-500">Chat Controls</p>
                    <h4 id="session-menu-title" class="mt-2 text-sm font-black tracking-tight text-slate-900 dark:text-white truncate">Chat actual</h4>
                    <p class="mt-1 text-[11px] text-slate-500 dark:text-slate-400">Mantén presionado o usa clic derecho para gestionar esta sesión.</p>
                </div>

                <div id="session-menu-actions" class="p-2 space-y-1.5">
                    <button type="button" onclick="beginRenameSession()" class="session-menu-button">
                        <i data-lucide="pen-square" class="w-4 h-4"></i>
                        <span>Renombrar chat</span>
                    </button>
                    <button type="button" onclick="deleteSessionFromMenu()" class="session-menu-button session-menu-danger">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                        <span>Eliminar chat</span>
                    </button>
                </div>

                <div id="session-rename-box" class="hidden p-3 space-y-2.5">
                    <label for="session-rename-input" class="block text-[9px] font-black uppercase tracking-[0.22em] text-slate-400 dark:text-slate-500">Nuevo título</label>
                    <input id="session-rename-input" type="text" maxlength="40" placeholder="Ponle un nombre elegante" class="w-full rounded-2xl border border-slate-200/80 dark:border-white/10 bg-white/85 dark:bg-black/30 px-3 py-2.5 text-sm font-bold text-slate-900 dark:text-white outline-none focus:border-indigo-500/50 focus:ring-2 focus:ring-indigo-500/20" />
                    <div class="flex gap-2 pt-1">
                        <button type="button" onclick="cancelRenameSession()" class="flex-1 rounded-xl px-3 py-2 text-[10px] font-black uppercase tracking-[0.18em] bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">Cancelar</button>
                        <button type="button" onclick="confirmRenameSession()" class="flex-1 rounded-xl px-3 py-2 text-[10px] font-black uppercase tracking-[0.18em] bg-indigo-600 text-white hover:bg-indigo-700 transition-colors">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals and Lightbox -->
        <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-slate-950/82 dark:bg-black/88 backdrop-blur-md flex items-center justify-center p-4 cursor-zoom-out transition-opacity duration-300" onclick="closeLightbox()">
            <img id="lightbox-img" src="" class="max-w-full max-h-full rounded-[1.35rem] border border-white/10 shadow-[0_30px_120px_rgba(0,0,0,0.45)] animate-in zoom-in-95">
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden opacity-0 fixed inset-0 z-50 flex items-center justify-center p-0 md:p-4 bg-slate-50 dark:bg-[#090b11] md:bg-slate-950/35 md:dark:bg-black/72 transition-opacity duration-300" onclick="if (event.target === this) closeSettings()">
            <div id="settings-panel" class="settings-shell border rounded-none md:rounded-[2rem] max-w-5xl w-full flex flex-col md:flex-row overflow-hidden shadow-2xl animate-in zoom-in-95 duration-300 h-[100dvh] md:h-auto md:max-h-[92dvh] bg-[#f8fafc] dark:bg-[#090b11] border-slate-200/80 dark:border-white/10">
                
                <div id="settings-nav" class="settings-nav w-full md:w-[290px] p-3 md:p-5 xl:p-6 border-b md:border-b-0 md:border-r flex flex-col bg-slate-50/50 dark:bg-white/[0.02] border-slate-200/50 dark:border-white/5 relative flex-shrink-0 overflow-y-auto scrollbar-hide">
                    <div class="settings-nav-header settings-nav-toolbar">
                        <div class="settings-mobile-toolbar-copy md:hidden" aria-live="polite">
                            <span id="settings-mobile-toolbar-title" class="settings-mobile-toolbar-title">Ajustes</span>
                        </div>
                        <div class="settings-nav-actions">
                            <button data-magnetic="soft" type="button" onclick="goBackSettings()" class="settings-back-mobile md:hidden" title="Volver">
                                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                            </button>
                            <button data-magnetic="soft" type="button" onclick="closeSettings()" class="settings-close-mobile" title="Cerrar ajustes">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div id="settings-tabs" class="settings-tabs-shell">
                        <!-- Tabs injected via JS -->
                    </div>
                </div>

                <div class="settings-pane flex-1 p-4 md:p-7 xl:p-8 flex flex-col overflow-y-auto scrollbar-hide">
                    <div id="settings-content" class="flex-1 space-y-4 md:space-y-6 pb-4 md:pb-0">
                        <!-- Content injected via JS -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- MAIN LOGIC -->
    <script src="assets/js/core/platform.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>
</html>
